name: SightReader AI Trainer Image

on:
  push:
    branches:
      - main
      - unraid-template
    paths:
      - Dockerfile
      - compose.yaml
      - docker/**
      - src/**
      - training/**
      - tests/**
      - pyproject.toml
      - icons/**
      - templates/**
      - ca_profile.xml
      - LICENSE
      - .github/workflows/sightreader-ai-trainer-image.yml
  schedule:
    - cron: "27 8 * * 1"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/ezrasong/sightreader-ai-trainer

jobs:
  validate-and-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Validate Unraid metadata
        run: |
          python - <<'PY'
          import xml.etree.ElementTree as ET

          for path in ("ca_profile.xml", "icons/sightreader-ai.svg", "templates/sightreader-ai-trainer.xml"):
              ET.parse(path)
              print(f"ok {path}")
          PY

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Validate Compose file
        run: docker compose config

      - name: Build Compose image
        run: docker compose build sightreader-ai-trainer

      - name: Run container tests
        run: docker compose run --rm sightreader-ai-trainer test

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
